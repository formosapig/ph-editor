<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>INCARNATIO</title>
  <link rel="stylesheet" href="[[ url_for('static', filename='theme.css') ]]" />
  <link rel="stylesheet" href="[[ url_for('static', filename='edit.css') ]]" />
  <script src="[[ url_for('static', filename='edit.js') ]]" type="module"></script>
  <script src="[[ url_for('static', filename='alpine.min.js') ]]" defer></script>
</head>
<body x-data='characterEditor({
    sn: [[ sn | tojson ]],
    file_id: [[ file_id | tojson ]],
    correct: [[ correct | tojson ]],
    soul: [[ soul | tojson ]],
    meat: [[ meat | tojson ]],
    form: [[ form | tojson ]],
    code: [[ code | tojson ]],
    mistor_map: [[ mistor_map | safe ]],
    mistor_regex: [[ mistor_regex | tojson ]],
    omnion_map: [[omnion_map | safe ]],
    omnion_regex: [[omnion_regex | tojson ]],
    initialData: [[ data | safe ]],
})' x-cloak>
    <div class="app-layout-wrapper">
        <!-- 左側縮圖區 -->
        <aside class="thumbnail-container">
            <div class="thumbnail-assets">
                <img :src="'/api/character/' + sn + '/thumbnail'"
                    alt="縮圖"
                    draggable="false"
                    @dblclick="reload($event.target)">
                <span class="file-id-label" x-text="file_id"></span>
                <span class="file-id-remark"
                    contenteditable="true"
                    x-ref="remark"
                    @input="handleRemarkInput()"
                    @blur="saveRemark">[[ remark ]]</span>
            </div>

            <!-- 資訊區（文字全部集中在下層） -->
            <div class="thumbnail-info">
                <span class="correct" x-show="correct" x-text="correct"></span>
            </div>
        </aside>
        
        <!-- 右側編輯區 -->
        <main class="tab-container">
            <div class="tab-buttons">
                <template x-for="(label, key) in mainTabs">
                    <button class="tab-button" 
                            :class="{ 'active': activeMainTab === key }"
                            @click="switchMainTab(key)" 
                            x-text="label"></button>
                </template>
            </div>

            <div class="sub-tab-buttons">
                <template x-for="sub in subTabsConfig[activeMainTab]">
                    <button class="sub-tab-button" 
                            :class="{ 'active': activeSubTab === sub.key }"
                            @click="switchSubTab(sub.key)" 
                            x-text="sub.label"></button>
                </template>
            </div>
            
            <section class="content-wrapper">
                <!-- 下拉選單區 -->
                <div id="dropdown-container" class="floating-dropdown" :class="{ 'show': dropdowns.length > 0 }">
                    <template x-for="(config, index) in dropdowns">
                        <div class="dropdown-slot" style="display: flex;">
                            <label x-text="config.displayLabel"></label>
                            <select @change="handleDropdownChange(config, $event)">
                                <template x-for="opt in config.options">
                                    <option :value="JSON.stringify(opt.value)" 
                                            :selected="isOptionSelected(config, opt)"
                                            :disabled="!!opt.disabled"
                                            x-text="opt.label"></option>
                                </template>
                            </select>
                        </div>
                    </template>
                </div>
                
                <!-- 主要文字線輯區 -->
                <div class="main-content-shell">
                    <div class="main-content" 
                        contenteditable="true" 
                        x-ref="mainContent"
                        x-effect="renderContent()"
                        @mouseup="translateSelection($event)"
                        @mousemove="handleMouseMove($event)"
                        @click="findEnclosedText($event)"
                        @input="handleContentInput()"
                        @blur="saveContent()"></div>
                        <!-- 防止貼上格式，但是會導致資料錯亂，例如在 backstage 改了,瞬間移到 profile ，profile 資料會爛掉...
                        @paste.prevent="document.execCommand('insertText', false, $event.clipboardData.getData('text/plain'))"></div>
                        -->
                </div>

            </section>
        </main>
        <!-- 右邊訊息欄 -->
        <div class="info-container">
            <div class="info-panel">
                <span class="info-content info-soul" x-text="soul"></span>
                <span class="info-content info-meat" x-text="meat"></span>
                <span class="info-content info-form" x-text="form"></span>
                <span class="info-content info-code" x-text="code"></span>
                <!-- 控制區 -->
                <div>
                    <button @click="run()" x-text="busy ? '...' : '按下後，請切換視窗'"></button>
                    <!--<div x-for="line in logs" x-text="line"></div>-->
                    <input 
                        id="key-input"
                        type="text" 
                        x-model="simulate" 
                        :disabled="busy"
                        placeholder="預設會先按 r ，不用寫"
                    />
                    <!--<pre class="log-dump" x-text="[...logs].join('\n')"></pre>-->
                </div>
            </div>
            <!-- 萬有之書 -->
            <!--<div class="info-omnion-container">
                <template x-for="item in omnionList">
                    <div class="info-omnion-row">
                        <span class="omnion-tag"
                            :class="item.type"
                            x-text="item.key"></span>
                        <span class="omnion-text" x-text="item.desc"></span>
                    </div>
                </template>
            </div>-->
            <div class="info-omnion-container">
                <template x-for="item in omnionList">
                    <div class="info-omnion-row" 
                        @click="toggleOmnion(item.key)" 
                        style="cursor: pointer;"> <span class="omnion-tag"
                            :class="item.type"
                            x-text="item.key"></span>
                        
                        <span class="omnion-text" 
                            x-show="expandedKeys.includes(item.key)"
                            x-transition
                            x-text="item.desc"></span>
                    </div>
                </template>
            </div>
        </div> <!--info-container-->
    </div> <!-- app-layout-wrapper -->

    <!-- Tooltip -->
    <div id="tooltip"
         x-show="tooltip.show"
         x-text="tooltip.text"
         :style="`left:${tooltip.x}px;top:${tooltip.y}px;`"
         @mouseenter="clearTimeout(hideTimer)"
         @mouseleave="hideTooltip()">
    </div>

    <div class="toast-container">
        <template x-for="msg in messages" :key="msg.id">
            <div class="toast-message" :class="msg.type" x-text="msg.text"></div>
        </template>
    </div>

    [% if not session.get('unlocked', False) %]
        <script src="[[ url_for('static', filename='base.js') ]]"></script>
    [% endif %]
</body>
</html>
