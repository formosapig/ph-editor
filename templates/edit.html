<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>編輯檔案</title>
  <link rel="stylesheet" href="[[ url_for('static', filename='edit.css') ]]" />
  <script src="[[ url_for('static', filename='edit.js') ]]" type="module"></script>
  <script src="[[ url_for('static', filename='alpine.min.js') ]]" defer></script>
</head>
<body x-data='characterEditor({
    sn: [[ sn | tojson ]],
    remark: [[ remark | tojson ]],
    status: [[ status | tojson ]],
    initialData: [[ data | safe ]],
    sub_sn: [[ sub_sn | tojson if sub_sn else "null" ]]
})' x-init="init()" x-cloak>

    <div style="display: flex; align-items: center; gap: 0.5em; margin-bottom: 10px; user-select: none; cursor: default;">
        <span class="file-id-label">[[ file_id ]]</span>

        <span id="file-id-remark" 
              contenteditable="true" 
              x-ref="remark"
              @input="handleRemarkInput()"
              @blur="saveRemark()">[[ remark ]]</span>

        <div class="status-radio-group">
            <template x-for="s in ['archived', 'draft', 'refinement', 'finalized']">
                <label class="status-radio-btn">
                    <input type="radio" name="file-status" :value="s" 
                           x-model="status" @change="updateStatus(s)">
                    <span x-text="getStatusLabel(s)"></span>
                </label>
            </template>
        </div>
    </div>

    <div class="tab-container">
        <div class="tab-buttons">
            <template x-for="(label, key) in mainTabs">
                <button class="tab-button" 
                        :class="{ 'active': activeMainTab === key }"
                        @click="switchMainTab(key)" 
                        x-text="label"></button>
            </template>
        </div>

        <div class="sub-tab-buttons">
            <template x-for="sub in subTabsConfig[activeMainTab]">
                <button class="sub-tab-button" 
                        :class="{ 'active': activeSubTab === sub.key }"
                        @click="switchSubTab(sub.key)" 
                        x-text="sub.label"></button>
            </template>
        </div>
        
        <div class="content-and-thumbnail-wrapper">
            <div id="dropdown-container" class="floating-dropdown" :class="{ 'show': dropdowns.length > 0 }">
                <template x-for="(config, index) in dropdowns">
                    <div class="dropdown-slot" style="display: flex;">
                        <label x-text="config.displayLabel"></label>
                        <select @change="handleDropdownChange(config, $event)">
                            <template x-for="opt in config.options">
                                <option :value="JSON.stringify(opt.value)" 
                                        :selected="isOptionSelected(config, opt)"
                                        :disabled="!!opt.disabled"
                                        x-text="opt.label"></option>
                            </template>
                        </select>
                    </div>
                </template>
            </div>

            <div id="main-content-shell">
                <div id="main-content" 
                     contenteditable="true" 
                     x-ref="mainContent"
                     @input="handleContentInput()"
                     @blur="saveContent()"></div>
            </div>
            
            <div id="thumbnail-container">
                <div id="main-thumb-wrapper">
                    <img :src="'/api/characters/' + sn + '/thumbnail'"
                         alt="主角縮圖"
                         draggable="false">
                </div>
                
                <template x-if="sub_sn">
                    <div id="sub-thumb-wrapper">
                        <img :src="'/api/characters/' + sub_sn + '/thumbnail'"
                             alt="配角縮圖"
                             draggable="false">
                    </div> 
                </template>
            </div>


        </div>
    </div>

    <div id="result-message" :class="messageType" x-text="messageText"></div>
</body>
</html>
