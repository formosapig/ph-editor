<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全域設定</title>
    <link rel="stylesheet" href="[[ url_for('static', filename='general.css') ]]" />
    <script src="[[ url_for('static', filename='general.js') ]]" defer></script>
    <script src="[[ url_for('static', filename='alpine.min.js') ]]" defer></script>
</head>
<body>

<div x-data="setupApp()" x-init="init()">
  <div class="header-actions">
    <h2>全域設定</h2>
    <button @click="submit" :disabled="isSubmitDisabled()" class="submit-btn">送出資料</button>
  </div>
<div class="tab-container">
  <input type="radio" id="tab1" name="tabs" checked @change="$refs.scrollBox.scrollTop = 0">
  <input type="radio" id="tab2" name="tabs" @change="$refs.scrollBox.scrollTop = 0">
  <input type="radio" id="tab3" name="tabs" @change="$refs.scrollBox.scrollTop = 0">
  <input type="radio" id="tab4" name="tabs" @change="$refs.scrollBox.scrollTop = 0">

  <nav class="tab-menu">
    <label for="tab1">特質顏色</label>
    <label for="tab2">標籤類型</label>
    <label for="tab3">標籤詳細</label>
    <label for="tab4">簡介分組</label>
  </nav>

<div class="tab-scroll-box" x-ref="scrollBox">
  <div class="tab-content">



  <section id="content1">
    <h3>特質-顏色 設定</h3>
    <table>
      <thead>
        <tr>
          <th>特質</th>
          <th>顏色</th>
          <th>編碼</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="(item, index) in color_traits" :key="index">
          <tr>
            <td><input type="text" x-model="item.trait.zh" placeholder="特質 (中文)" /></td>
            <td><input type="text" x-model="item.name.zh" placeholder="顏色名稱 (中文)" /></td>
            <td><input type="color" x-model="item.code" /></td>
            <td>
              <button @click="removeColorTrait(index)" :disabled="color_traits.length === 1">刪除</button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
    <button @click="addColorTrait">新增一行</button>
  </section>

  <section id="content2">
    <h3>標籤類型</h3>
    <table>
      <thead>
        <tr>
          <th>鍵值(英文)</th>
          <th>標籤類型</th>
          <th>文字</th>
          <th>背景</th>
          <th>排序</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="(item, index) in tag_type_settings_array" :key="index">
          <tr>
            <td><input type="text" x-model="item.key" placeholder="例如: origin" /></td>
            <td>
              <input
                type="text"
                x-model="item.name.zh"
                placeholder="例如: 本源 (中文)"
                class="tag-type-name-input"
                :style="{ color: item.color, backgroundColor: item.background }"
              />
            </td>
            <td><input type="color" x-model="item.color" /></td>
            <td><input type="color" x-model="item.background" /></td>
            <td><input type="number" x-model.number="item.order" placeholder="排序數字" min="1" /></td>
            <td>
              <button @click="removeTagTypeSetting(index)" :disabled="tag_type_settings_array.length === 1">刪除</button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
    <button @click="addTagTypeSetting">新增一行</button>
  </section>

  <section id="content3">
    <h3>標籤設定</h3>
    <table>
      <thead>
        <tr>
          <th>類型</th>
          <th>名稱</th>
          <th>描述</th>
          <th>拍照</th>
          <th>特徵</th>
          <th>穿著</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="(item, index) in tag_array" :key="item.id">
          <tr>
            <td>
              <select x-model="item.type">
                <option disabled value="">請選擇類型</option>
                <template x-for="typeItem in tag_type_settings_array" :key="typeItem.key">
                    <option :value="typeItem.key" x-text="typeItem.name.zh" :selected="item.type === typeItem.key"></option>
                </template>
              </select>
            </td>
            <td>
              <input
                type="text"
                x-model="item.name.zh"
                placeholder="名稱" 
                :style="getTagStyle(item.type)"
              />
            </td>
            <td><textarea x-model="item.desc.zh" placeholder="描述"></textarea></td>
            <td><textarea x-model="item.snapshot.zh" placeholder="拍照"></textarea></td>
            <td><textarea x-model="item.appearance.zh" placeholder="特徵"></textarea></td>
            <td><textarea x-model="item.clothing.zh" placeholder="穿著"></textarea></td>
            <td>
              <button @click="removeTag(index)" :disabled="tag_array.length === 1">刪除</button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
    <button @click="addTag">新增一行</button>
  </section>

  <section id="content4">
    <h3>簡介分組</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>名稱</th>
          <th>描述</th>
          <th>文字</th>
          <th>背景</th>
          <th>排序</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="(item, index) in profile_group_array" :key="item.id">
          <tr>
            <td x-text="item.id"></td>
            <td>
              <input 
                type="text" 
                x-model="item.name.zh" 
                placeholder="分組名稱"
                :style="{ color: item.color, backgroundColor: item.background }"
              />
            </td>
            <td><textarea x-model="item.desc.zh" placeholder="描述"></textarea></td>
            <td><input type="color" x-model="item.color" /></td>
            <td><input type="color" x-model="item.background" /></td>
            <td><input type="number" x-model.number="item.order" min="1" /></td>
            <td>
              <button @click="removeProfileGroup(index)" :disabled="profile_group_array.length === 1">刪除</button>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
    <button @click="addProfileGroup">新增分組</button>
  </section>

  </div>
</div>
</div>
</div>

<script>
  // 透過全域變數傳遞 Jinja2 資料給 app.js
  window.INIT_DATA = {
    colorTraits: [[ color_traits | tojson ]],
    tagStyles: [[ tag_styles | tojson ]],
    tagList: [[ tag_list | tojson ]],
    profileGroup: [[ profile_group | tojson ]]
  };
</script>
</body>
</html>
