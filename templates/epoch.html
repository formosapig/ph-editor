<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歲月</title>
    <link rel="stylesheet" href="[[ url_for('static', filename='theme.css') ]]" />
    <link rel="stylesheet" href="[[ url_for('static', filename='epoch.css') ]]" />
    <script src="[[ url_for('static', filename='epoch.js') ]]" type="module"></script>
    <script src="[[ url_for('static', filename='alpine3.15.12/cdn.min.js') ]]" defer></script>
</head>
<body>


<div id="app" 
     x-data="epochManager()" 
     x-init="init()">
    
    <main class="dashboard">
        
        <section class="main-content">
            <div class="table-container">
                <table border="1" style="border-collapse: collapse; width: 100%;"
                    @dragover.prevent
                    @drop="handleDrop($event)"
                    class="character-table">
                    <thead>
                        <tr>
                            <template x-for="age in ageColumns" :key="age">
                                <th x-text="age"></th>
                            </template>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="(row, index) in tableRows" :key="index">
                            <tr>
                                <template x-for="(cell, idx) in row.cols" :key="idx">
                                    <td 
                                        @dragover.prevent
                                        :class="{ 'sticky-col': idx === 0 }"
                                        style="text-align: center; border: 1px solid #ccc; position: relative;"
                                    >
                                        <template x-if="cell">
                                            <div 
                                                class="has-character"
                                                :data-sn="cell" 
                                                draggable="true"
                                                @dragstart="handleDragStart($event, epochChain.find(c => c.sn === cell))"
                                                @drop.stop="handleDrop($event, cell)"
                                                style="background-color: #fff; padding: 8px; border-radius: 4px; cursor: grab; border: 2px solid #555;"
                                            >
                                                <span x-text="cell"></span>
                                            </div>
                                        </template>

                                        <template x-if="!cell">
                                            <div style="width: 100%; height: 100%; min-height: 40px;"></div>
                                        </template>
                                    </td>
                                </template>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <section class="profile-selector">
                <select x-model="selectedProfile" @change="fetchCharacters()">
                    <template x-for="(opt, index) in profile_options" :key="index">
                        <option :value="opt.id"
                                x-text="opt.name"
                                :disabled="opt.disabled">
                        </option>
                    </template>
                </select>
            </section>
        </section>

        <footer class="character-dock"
            @dragover.prevent
            @drop="handleDropBack($event)">
            <div class="character-list">
                <template x-for="char in characters" :key="char.sn">
                    <div 
                        class="character-card"
                        draggable="true"
                        @dragstart="handleDragStart($event, char)"
                        :class="{ 'has-parent': char.parent_sn }"
                    >
                        <span x-show="char.age" class="age-badge" x-text="char.age"></span>
                        <div class="avatar-box">
                            <img :src="'/api/character/' + char.sn + '/thumbnail'" alt="thumb" draggable="false">
                        </div>
                        <div class="file-id" x-text="char.file_id"></div>
                    </div>
                </template>
            </div>
        </footer>

    </main>
</div>
    <script>
        window.INITIAL_PROFILES = [[ profile_options | tojson ]];
    </script>
    <script src="[[ url_for('static', filename='base.js') ]]"></script>
</body>
</html>
